name: Build and Tag Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Set version dynamically
      - name: Set version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      # 3. Build Docker image
      - name: Build Docker image
        run: docker build -t my-app:${{ env.VERSION }} .

      # 4. List Docker images (to check build)
      - name: Show Docker images
        run: docker images

      # 5. Optional: Push to Docker Hub
